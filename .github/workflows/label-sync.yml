name: Sync labels

# Keeps repo labels in sync with .github/labels.yml.
# Run manually, or on changes to the label definitions.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [".github/labels.yml"]

permissions:
  issues: write

jobs:
  labeler:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crazy-max/ghaction-github-labeler@v5
        with:
          yaml-file: .github/labels.yml
          skip-delete: true
