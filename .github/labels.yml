# Course labels. Sync with an action (e.g. crazy-max/ghaction-github-labeler) or the gh CLI:
#   gh label create <name> --color <hex> --description "<desc>"
# Weekly + workflow labels are applied automatically by the issue forms in ISSUE_TEMPLATE/.

- name: setup
  color: "0e8a16"
  description: Pre-course environment setup
- name: project
  color: "1d76db"
  description: Student research project (home-base issue)
- name: progress
  color: "5319e7"
  description: Weekly research-progress report
- name: submission
  color: "0e8a16"
  description: Work submitted for automatic assessment
- name: question-set
  color: "bfdadc"
  description: Weekly question set submission
- name: assignment
  color: "c2e0c6"
  description: Weekly class assignment submission
- name: help
  color: "d93f0b"
  description: Student needs help / is stuck
- name: bug
  color: "b60205"
  description: Reproducible technical failure

