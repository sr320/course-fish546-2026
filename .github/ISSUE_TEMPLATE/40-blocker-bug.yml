name: "🐛 Technical Blocker / Bug"
description: A reproducible technical failure in code or a pipeline.
title: "[bug] <one-line summary>"
labels: ["bug", "help"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What's broken?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered steps someone else could follow to see the same failure.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs. actual
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Platform (own/Raven/Hyak), OS, software versions, container hash if on Klone.
      render: text
    validations:
      required: true
  - type: input
    id: link
    attributes:
      label: Link to the code / commit / log
      placeholder: "https://github.com/course-fish546-2026/<repo>/blob/<sha>/..."
