name: "Assignment Submission"
description: Submit a weekly class assignment for automatic pre-checking.
title: "[assignment] week NN - <your name>"
labels: ["submission", "assignment"]
body:
  - type: markdown
    attributes:
      value: |
        Submit the exact version you want assessed. The automatic checker uses the repository URL, commit SHA, and manifest path below.
  - type: dropdown
    id: week
    attributes:
      label: Week
      options: ["00","01","02","03","04","05","06","07","08","09","10"]
    validations:
      required: true
  - type: input
    id: repo
    attributes:
      label: Course repository URL
      placeholder: "https://github.com/course-fish546-2026/<your-repo>"
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit SHA
      description: The exact commit that contains your submitted work.
      placeholder: "abc1234..."
    validations:
      required: true
  - type: input
    id: manifest
    attributes:
      label: Submission manifest path
      placeholder: "assignment/02-fastq-qc/submission.yml"
    validations:
      required: true
  - type: input
    id: rendered
    attributes:
      label: Rendered report path
      placeholder: "assignment/02-fastq-qc/analysis.html"
    validations:
      required: true
  - type: textarea
    id: outputs
    attributes:
      label: Key output paths
      description: One path per line. Include tables, figures, logs, or scripts that the assignment asks for.
      placeholder: |
        assignment/02-fastq-qc/output/read-counts.csv
        assignment/02-fastq-qc/output/qc-summary.png
    validations:
      required: true
  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: "I included the source file or script used to produce the report."
          required: true
        - label: "I did not commit large or restricted raw data unless the assignment explicitly allowed it."
          required: true
        - label: "I understand that editing this issue with a new commit SHA resubmits the work."
          required: true
  - type: textarea
    id: note
    attributes:
      label: Optional note to instructor
      description: Use this for anything the automatic checker will not understand.
